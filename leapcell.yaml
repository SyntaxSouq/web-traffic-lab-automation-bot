# Leapcell Deployment Configuration
# This file configures how your app runs on Leapcell

version: "1.0"

service:
  name: web-automation-platform
  runtime: nodejs
  node_version: "20"
  
  # Build configuration - CRITICAL: Must install Playwright browsers
  build:
    commands:
      - npm install
      - npx playwright install chromium
      - npx playwright install-deps chromium
      - cd frontend
      - npm install --include=dev
      - npm run build
      - cd ..
      - echo "Build complete. Verifying setup..."
      - ls -la frontend/dist/
      - echo "Playwright browsers installed:"
      - ls -la .cache/ms-playwright/ || echo "No .cache directory"

  # Start command
  start:
    command: node backend/server.js
  
  # Environment variables
  env:
    NODE_ENV: production
    PORT: 7860
    PLAYWRIGHT_BROWSERS_PATH: /app/.cache/ms-playwright
  
  # Resource allocation
  resources:
    cpu: 1
    memory: 2GB
  
  # Health check
  health_check:
    path: /api/health
    interval: 30
    timeout: 5
